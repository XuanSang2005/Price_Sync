spring.application.name=price_sync

spring.datasource.url=jdbc:postgresql://localhost:5432/price_sync
spring.datasource.username=macbookpro
spring.datasource.password=
app.security.api-key=${HQ_API_KEY}
app.security.hmac-secret=${HQ_HMAC_SECRET}
app.security.timestamp-window-seconds=300
server.error.include-stacktrace=never

# SMTP gửi alert khi batch FAILED. MẶC ĐỊNH = Mailpit local (127.0.0.1:1025, không auth/TLS).
# Gửi THẬT ra Gmail: đặt env MAIL_HOST=smtp.gmail.com MAIL_PORT=587 MAIL_AUTH=true MAIL_STARTTLS=true
#   MAIL_USERNAME=<gmail> MAIL_PASSWORD=<app-password 16 ký tự>. Secret → env, KHÔNG commit.
spring.mail.host=${MAIL_HOST:127.0.0.1}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
